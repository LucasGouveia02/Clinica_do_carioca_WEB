<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Histórico de Consultas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/Reset.css" />
  <link rel="stylesheet" href="css/HistoricoConsultas.css" />
</head>
<body>
  <nav class="navbar p-3">
    <div class="container-fluid d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-3 img-greeting">
        <img src="img/logo.png" alt="Logo" class="logo-img">
        <span class="navbar-brand mb-0 h5" id="greeting">Olá!</span>
      </div>
      <button class="btn btn-outline-light" title="Sair">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </nav>

  <div class="container my-4">
    <h3 class="mb-4">Histórico de consultas</h3>

    <div class="input-group mb-3">
      <input type="text" class="form-control" id="searchInput" placeholder="Digite o nome do profissional ou paciente" />
      <button class="btn btn-primary" onclick="filtrar()">Buscar</button>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered text-center align-middle">
        <thead id="tableHeader"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="d-flex justify-content-end gap-3 mt-4">
      <button class="btn btn-outline-primary btn-voltar">Voltar</button>
      <button class="btn btn-primary btn-detalhes">Detalhes</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/HistoricoConsultas.js"></script>
</body>
</html>
