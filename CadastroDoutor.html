<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/cadastroPaciente/CadastroPaciente.css" rel="stylesheet">
</head>
<body>

<div class="container">
    <h2 class="text-primary mb-4">Realize o cadastro do Doutor</h2>
    <div class="form-section">
        <form id="cadastroDoutorForm">
            <div class="row">
                <div class="col-md-6">
                    <h5 class="fw-bold mb-4">Informações pessoais</h5>

                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome completo</label>
                        <input type="text" class="form-control" id="nome" placeholder="Digite o nome completo">
                    </div>

                    <div class="mb-3">
                        <label for="crm" class="form-label">CRM</label>
                        <input type="text" class="form-control" id="crm" placeholder="Digite o CRM">
                    </div>

                    <div class="mb-3">
                        <label for="especialidade" class="form-label">Especialidade</label>
                        <select class="form-control" id="especialidade">
                            <option value="" disabled selected>Selecione a especialidade</option>
                            <option value="clinica-geral">Clínico Geral</option>
                            <option value="cardiologia">Cardiologia</option>
                            <option value="dermatologia">Dermatologia</option>
                            <option value="pediatria">Pediatria</option>
                            <option value="ortopedia">Ortopedia</option>
                            <option value="neurologia">Neurologia</option>
                            <option value="ginecologia">Ginecologia</option>
                            <option value="psiquiatria">Psiquiatria</option>
                            <option value="oftalmologia">Oftalmologia</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="text" class="form-control" id="telefone" placeholder="Digite o telefone">
                    </div>

                    
                </div>

                <div class="col-md-6">
                    <h5 class="fw-bold mb-4">Informações de login</h5>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="Digite seu email">
                    </div>

                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" placeholder="Digite sua senha">
                    </div>

                    <div class="mb-3">
                        <label for="confirmaSenha" class="form-label">Confirme sua senha</label>
                        <input type="password" class="form-control" id="confirmaSenha" placeholder="Confirme sua senha">
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-end mt-4 gap-2">
                <button type="reset" class="btn btn-outline-primary-custom px-4">CANCELAR</button>
                <button type="submit" class="btn btn-primary-custom px-4">CADASTRAR</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/CadastroDoutor/CadastroDoutor.js"></script>
</body>
</html>
