<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/cadastroPaciente/CadastroPaciente.css" rel="stylesheet">
</head>
<body>

<div class="container">
    <h2 class="text-primary mb-4">Faça seu cadastro</h2>
    <div class="form-section">
        <form id="cadastroPacienteForm">
            <div class="row">
                <div class="col-md-6">
                    <h5 class="fw-bold mb-4">Informações pessoais</h5>

                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome completo</label>
                        <input type="text" class="form-control" id="nome" placeholder="Digite seu nome completo">
                    </div>

                    <div class="mb-3">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf" placeholder="Digite seu CPF">
                    </div>

                    <div class="mb-3">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="text" class="form-control" id="telefone" placeholder="Digite seu telefone">
                    </div>

                    <div class="mb-3">
                        <label for="nascimento" class="form-label">Data de nascimento</label>
                        <input type="date" class="form-control" id="nascimento">
                    </div>
                </div>
                <div class="col-md-6">
                    <h5 class="fw-bold mb-4">Informações de login</h5>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="Digite seu email">
                    </div>

                    <div class="mb-3">
                        <label for="senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="senha" placeholder="Digite sua senha">
                    </div>

                    <div class="mb-3">
                        <label for="confirmaSenha" class="form-label">Confirme sua senha</label>
                        <input type="password" class="form-control" id="confirmaSenha" placeholder="Confirme sua senha">
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-end mt-4 gap-2">
                <button type="reset" class="btn btn-outline-primary-custom px-4">CANCELAR</button>
                <button type="submit" class="btn btn-primary-custom px-4">CADASTRAR</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/Cadastro/CadastroPaciente.js"></script>
<script src="js/Cadastro/Validaformulario.js"></script>
</body>
</html>
