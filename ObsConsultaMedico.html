<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/ObsConsultaMedico/style.css">
  <link rel="stylesheet" href="css/Reset.css"/>

  <title>Obs Consulta Médico</title>
</head>
<body>

  <header>
    <nav class="navbar d-flex justify-content-between">
      <div class="d-flex align-items-center gap-4 img-greeting">
          <img src="img/logo.png" alt="Logo" class="logo-img">
          <span class="navbar-brand mb-0 h5" id="greeting">Olá, Jefferson!</span>
      </div>
      <button class="btn btn-sair" title="Sair">
          <img src="img/sair.png" alt="Sair" class="img-sair" />
      </button>
    </nav>
  </header>

  <main class="container">
    <h1 class="title">Informações da consulta</h1>
  
    <form class="form-grid">
      <div class="form-group">
        <label for="nome">Nome</label>
        <input id="nome" disabled/>
      </div>
  
      <div class="form-group">
        <label for="modalidade">Modalidade de consulta</label>
        <input id="modalidade" disabled/>
      </div>
  
      <div class="form-group">
        <label for="unidade">Unidade</label>
        <input id="unidade" disabled/>
      </div>
  
      <div class="form-group full-width">
        <label for="observacoes">Observações</label>
        <textarea id="observacoes" rows="3" disabled></textarea>
      </div>
    </form>

    <h2 class="subtitle">Dados da consulta</h2>
    
    <form class="form-grid">
      <div class="form-group">
        <label for="status">Status da consulta</label>
        <input id="status" disabled/>
      </div>
  
      <div class="form-group full-width">
        <label for="observacoes">Observações do médico</label>
        <textarea id="observacoesMedico" rows="3"></textarea>
      </div>
    </form>
    
    <div class="buttons">
      <button class="btn-back" onclick="directToHistory()">Voltar</button>
      <button class="btn-schedule" onclick="salvarObservacao(1)">Salvar</button>
    </div>
  </main>

  <script src="js/obsConsultaMedica/ConexaoAPI.js"></script>
  
</body>
</html>
